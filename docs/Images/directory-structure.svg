<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 340" width="850" height="340">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .text-title { fill: #0f172a; font-family: sans-serif; font-size: 16; font-weight: bold; }
      .text-label { fill: #0f172a; font-family: sans-serif; font-size: 13; font-weight: bold; }
      .text-sublabel { fill: #475569; font-family: sans-serif; font-size: 11; }
      .text-anno { fill: #64748b; font-family: sans-serif; font-size: 10; }
      .box-slate-fill { fill: #f1f5f9; }
      .box-slate-stroke { stroke: #64748b; stroke-width: 1.5; }
      .text-slate { fill: #475569; }
      .box-cyan-fill { fill: #ecfeff; }
      .box-cyan-stroke { stroke: #0891b2; stroke-width: 1.5; }
      .text-cyan { fill: #0e7490; }
      .box-emerald-fill { fill: #ecfdf5; }
      .box-emerald-stroke { stroke: #059669; stroke-width: 1.5; }
      .text-emerald { fill: #047857; }
      .box-violet-fill { fill: #f5f3ff; }
      .box-violet-stroke { stroke: #7c3aed; stroke-width: 1.5; }
      .text-violet { fill: #6d28d9; }
      .file-dir { font-size: 11; font-weight: bold; }
      .file-item { font-size: 10; }
      .arrow { fill: none; stroke: #94a3b8; stroke-width: 1.5; marker-end: url(#arrow); }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .text-title { fill: #e2e8f0; }
        .text-label { fill: #e2e8f0; }
        .text-sublabel { fill: #94a3b8; }
        .text-anno { fill: #64748b; }
        .box-slate-fill { fill: rgba(30,41,59,0.5); }
        .box-slate-stroke { stroke: #94a3b8; }
        .text-slate { fill: #94a3b8; }
        .box-cyan-fill { fill: rgba(8,51,68,0.4); }
        .box-cyan-stroke { stroke: #22d3ee; }
        .text-cyan { fill: #22d3ee; }
        .box-emerald-fill { fill: rgba(6,78,59,0.4); }
        .box-emerald-stroke { stroke: #34d399; }
        .text-emerald { fill: #34d399; }
        .box-violet-fill { fill: rgba(76,29,149,0.4); }
        .box-violet-stroke { stroke: #a78bfa; }
        .text-violet { fill: #c4b5fd; }
        .file-dir { font-size: 11; font-weight: bold; }
        .file-item { font-size: 10; }
        .arrow { stroke: #64748b; }
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" class="bg" rx="8"/>
  <text x="425" y="28" text-anchor="middle" class="text-title">Project Directory Structure</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Root: Prototype/ (centered)              -->
  <!-- ════════════════════════════════════════ -->
  <rect x="275" y="40" width="300" height="38" rx="8" class="box-slate-fill box-slate-stroke"/>
  <text x="425" y="54" text-anchor="middle" class="text-label text-slate">Prototype/</text>
  <text x="425" y="70" text-anchor="middle" class="text-sublabel">Godot game root</text>

  <!-- Root → 3 directories: balanced arrows -->
  <path d="M 310 78 L 155 105" class="arrow" fill="none"/>
  <line x1="425" y1="78" x2="425" y2="105" class="arrow"/>
  <path d="M 540 78 L 695 105" class="arrow" fill="none"/>

  <!-- ════════════════════════════════════════ -->
  <!-- Column 1: CspScript (C#)                -->
  <!-- ════════════════════════════════════════ -->
  <rect x="25" y="105" width="260" height="215" rx="8" class="box-cyan-fill box-cyan-stroke"/>
  <text x="155" y="128" text-anchor="middle" class="text-label text-cyan">CspScript</text>
  <text x="155" y="145" text-anchor="middle" class="text-sublabel">C# Engine Core</text>

  <text x="40" y="170" class="file-dir text-cyan">GameManager.cs</text>
  <text x="40" y="195" class="file-dir text-cyan">Controller/</text>
  <text x="40" y="220" class="file-dir text-cyan">Model/</text>
  <text x="40" y="245" class="file-dir text-cyan">View/</text>
  <text x="55" y="268" class="file-item text-anno">View.cs</text>
  <text x="40" y="293" class="file-dir text-cyan">Utils/</text>
  <text x="40" y="310" class="file-dir text-cyan">Constants/</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Column 2: GdsScript (GDScript)          -->
  <!-- ════════════════════════════════════════ -->
  <rect x="295" y="105" width="260" height="215" rx="8" class="box-emerald-fill box-emerald-stroke"/>
  <text x="425" y="128" text-anchor="middle" class="text-label text-emerald">GdsScript</text>
  <text x="425" y="145" text-anchor="middle" class="text-sublabel">GDScript Logic</text>

  <text x="310" y="170" class="file-dir text-emerald">Data/</text>
  <text x="325" y="195" class="file-item text-anno">data.gd (Base)</text>
  <text x="325" y="220" class="file-item text-anno">character.gd</text>
  <text x="310" y="250" class="file-dir text-emerald">Flow/</text>
  <text x="325" y="275" class="file-item text-anno">Flow.gd (Base)</text>
  <text x="325" y="300" class="file-item text-anno">main_state.gd</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Column 3: ViewModel.tscn                -->
  <!-- ════════════════════════════════════════ -->
  <rect x="565" y="105" width="260" height="215" rx="8" class="box-violet-fill box-violet-stroke"/>
  <text x="695" y="128" text-anchor="middle" class="text-label text-violet">ViewModel.tscn</text>
  <text x="695" y="145" text-anchor="middle" class="text-sublabel">UI Template Scene</text>

  <text x="580" y="175" class="file-dir text-violet">Engine/</text>
  <text x="595" y="205" class="file-item text-anno">project.godot</text>
</svg>
