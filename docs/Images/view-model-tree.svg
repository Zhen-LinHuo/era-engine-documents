<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .text-title { fill: #0f172a; font-family: sans-serif; font-size: 16; font-weight: bold; }
      .text-label { fill: #0f172a; font-family: sans-serif; font-size: 13; font-weight: bold; }
      .text-sublabel { fill: #475569; font-family: sans-serif; font-size: 11; }
      .text-anno { fill: #64748b; font-family: sans-serif; font-size: 10; }
      .box-violet-fill { fill: #f5f3ff; }
      .box-violet-stroke { stroke: #7c3aed; stroke-width: 1.5; }
      .text-violet { fill: #6d28d9; }
      .box-cyan-fill { fill: #ecfeff; }
      .box-cyan-stroke { stroke: #0891b2; stroke-width: 1.5; }
      .text-cyan { fill: #0e7490; }
      .box-slate-fill { fill: #f1f5f9; }
      .box-slate-stroke { stroke: #64748b; stroke-width: 1.5; }
      .text-slate { fill: #475569; }
      .tree-line { fill: none; stroke: #94a3b8; stroke-width: 1.5; }
      .tree-arrow { fill: none; stroke: #94a3b8; stroke-width: 1.5; marker-end: url(#arrow); }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .text-title { fill: #e2e8f0; }
        .text-label { fill: #e2e8f0; }
        .text-sublabel { fill: #94a3b8; }
        .text-anno { fill: #64748b; }
        .box-violet-fill { fill: rgba(76,29,149,0.4); }
        .box-violet-stroke { stroke: #a78bfa; }
        .text-violet { fill: #c4b5fd; }
        .box-cyan-fill { fill: rgba(8,51,68,0.4); }
        .box-cyan-stroke { stroke: #22d3ee; }
        .text-cyan { fill: #22d3ee; }
        .box-slate-fill { fill: rgba(30,41,59,0.5); }
        .box-slate-stroke { stroke: #94a3b8; }
        .text-slate { fill: #94a3b8; }
        .tree-line { stroke: #64748b; }
        .tree-arrow { stroke: #64748b; }
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" class="bg" rx="8"/>
  <text x="400" y="28" text-anchor="middle" class="text-title">ViewModel.tscn Template Structure</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Level 0: Root (center=400)              -->
  <!-- ════════════════════════════════════════ -->
  <rect x="250" y="43" width="300" height="38" rx="8" class="box-violet-fill box-violet-stroke"/>
  <text x="400" y="60" text-anchor="middle" class="text-label text-violet">ViewModel (Root Node)</text>
  <text x="400" y="76" text-anchor="middle" class="text-sublabel">Template container</text>

  <!-- Root → 4 categories: T-branch -->
  <line x1="400" y1="81" x2="400" y2="93" class="tree-line"/>
  <line x1="130" y1="93" x2="670" y2="93" class="tree-line"/>
  <line x1="130" y1="93" x2="130" y2="115" class="tree-arrow"/>
  <line x1="310" y1="93" x2="310" y2="115" class="tree-arrow"/>
  <line x1="490" y1="93" x2="490" y2="115" class="tree-arrow"/>
  <line x1="670" y1="93" x2="670" y2="115" class="tree-arrow"/>

  <!-- ════════════════════════════════════════ -->
  <!-- Level 1: Category Nodes (h=46)          -->
  <!-- ════════════════════════════════════════ -->
  <rect x="52" y="115" width="155" height="46" rx="8" class="box-cyan-fill box-cyan-stroke"/>
  <text x="130" y="135" text-anchor="middle" class="text-label text-cyan">Unit Templates</text>
  <text x="130" y="154" text-anchor="middle" class="text-sublabel">UI unit prototypes</text>

  <rect x="232" y="115" width="155" height="46" rx="8" class="box-cyan-fill box-cyan-stroke"/>
  <text x="310" y="147" text-anchor="middle" class="text-label text-cyan">Suite Templates</text>

  <rect x="412" y="115" width="155" height="46" rx="8" class="box-cyan-fill box-cyan-stroke"/>
  <text x="490" y="135" text-anchor="middle" class="text-label text-cyan">Box Templates</text>
  <text x="490" y="154" text-anchor="middle" class="text-sublabel">HBox / VBox</text>

  <rect x="592" y="115" width="155" height="46" rx="8" class="box-cyan-fill box-cyan-stroke"/>
  <text x="670" y="135" text-anchor="middle" class="text-label text-cyan">View Scene</text>
  <text x="670" y="154" text-anchor="middle" class="text-sublabel">Canvas template</text>

  <!-- Unit → sub-items: T-branch (d=63, gap=16px) -->
  <line x1="130" y1="161" x2="130" y2="173" class="tree-line"/>
  <line x1="67" y1="173" x2="193" y2="173" class="tree-line"/>
  <line x1="67" y1="173" x2="67" y2="195" class="tree-arrow"/>
  <line x1="193" y1="173" x2="193" y2="195" class="tree-arrow"/>

  <!-- View → sub-items: T-branch (d=63, gap=16px) -->
  <line x1="670" y1="161" x2="670" y2="173" class="tree-line"/>
  <line x1="607" y1="173" x2="733" y2="173" class="tree-line"/>
  <line x1="607" y1="173" x2="607" y2="195" class="tree-arrow"/>
  <line x1="733" y1="173" x2="733" y2="195" class="tree-arrow"/>

  <!-- ════════════════════════════════════════ -->
  <!-- Level 2: Sub-items (w=110, gap=16px)    -->
  <!-- ════════════════════════════════════════ -->
  <rect x="12" y="195" width="110" height="28" rx="6" class="box-slate-fill box-slate-stroke"/>
  <text x="67" y="214" text-anchor="middle" class="text-sublabel">TextUnit</text>

  <rect x="138" y="195" width="110" height="28" rx="6" class="box-slate-fill box-slate-stroke"/>
  <text x="193" y="214" text-anchor="middle" class="text-sublabel">ButtonUnit</text>

  <rect x="552" y="195" width="110" height="28" rx="6" class="box-slate-fill box-slate-stroke"/>
  <text x="607" y="214" text-anchor="middle" class="text-sublabel">Main Scroll</text>

  <rect x="678" y="195" width="110" height="28" rx="6" class="box-slate-fill box-slate-stroke"/>
  <text x="733" y="214" text-anchor="middle" class="text-sublabel">Main Content</text>

  <!-- Footnote -->
  <text x="400" y="265" text-anchor="middle" class="text-anno">UnitContainer / Button→Unit component hierarchy defined in .tscn</text>
  <text x="400" y="282" text-anchor="middle" class="text-anno">ViewService duplicates templates at runtime via factory pattern</text>
</svg>
