  <rect width="100%" height="100%" class="bg" rx="8"/>
  <text x="25" y="30" class="text-title">Code vs Kojo Separation</text>
  <rect x="80" y="50" width="380" height="48" rx="8" class="box-cyan-fill box-cyan-stroke"/>
  <text x="270" y="69" text-anchor="middle" class="text-label text-cyan">Code Layer (GDScript)</text>
  <text x="270" y="90" text-anchor="middle" class="text-sublabel">State machine - Buttons - Logic</text>
  <rect x="80" y="144" width="380" height="48" rx="8" class="box-emerald-fill box-emerald-stroke"/>
  <text x="270" y="163" text-anchor="middle" class="text-label text-emerald">Kojo Layer (Data Files)</text>
  <text x="270" y="184" text-anchor="middle" class="text-sublabel">Dialogue - Narration - Description</text>
  <line x1="220" y1="98" x2="220" y2="144" class="arrow-cyan"/>
  <text x="210" y="122" text-anchor="end" class="text-anno">Scenario</text>
  <line x1="320" y1="98" x2="320" y2="144" class="arrow-cyan"/>
  <text x="330" y="122" text-anchor="start" class="text-anno">UI Actions</text>
</svg>