<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 270" width="660" height="270">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .text-title { fill: #0f172a; font-family: sans-serif; font-size: 16; font-weight: bold; }
      .text-label { fill: #0f172a; font-family: sans-serif; font-size: 13; font-weight: bold; }
      .text-sublabel { fill: #475569; font-family: sans-serif; font-size: 11; }
      .text-anno { fill: #64748b; font-family: sans-serif; font-size: 10; }
      .connector { fill: none; stroke: #94a3b8; stroke-width: 1.5; }
      .arrow-cyan { fill: none; stroke: #0891b2; stroke-width: 1.5; marker-end: url(#arrow-cyan); }
      .arrow-anno { fill: #0891b2; font-family: sans-serif; font-size: 10; font-style: italic; }
      .box-cyan-fill { fill: #ecfeff; }
      .box-cyan-stroke { stroke: #0891b2; stroke-width: 1.5; }
      .text-cyan { fill: #0e7490; }
      .box-emerald-fill { fill: #ecfdf5; }
      .box-emerald-stroke { stroke: #059669; stroke-width: 1.5; }
      .text-emerald { fill: #047857; }
      .box-slate-fill { fill: #f1f5f9; }
      .box-slate-stroke { stroke: #64748b; stroke-width: 1.5; }
      .text-slate { fill: #475569; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .text-title { fill: #e2e8f0; }
        .text-label { fill: #e2e8f0; }
        .text-sublabel { fill: #94a3b8; }
        .text-anno { fill: #64748b; }
        .connector { stroke: #64748b; }
        .arrow-cyan { stroke: #22d3ee; }
        .arrow-anno { fill: #22d3ee; }
        .box-cyan-fill { fill: rgba(8,51,68,0.4); }
        .box-cyan-stroke { stroke: #22d3ee; }
        .text-cyan { fill: #22d3ee; }
        .box-emerald-fill { fill: rgba(6,78,59,0.4); }
        .box-emerald-stroke { stroke: #34d399; }
        .text-emerald { fill: #34d399; }
        .box-slate-fill { fill: rgba(30,41,59,0.5); }
        .box-slate-stroke { stroke: #94a3b8; }
        .text-slate { fill: #94a3b8; }
      }
    </style>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#0891b2"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" class="bg" rx="8"/>
  <text x="25" y="30" class="text-title">Kojo File Structure</text>

  <!-- Root: project directory -->
  <rect x="140" y="45" width="280" height="35" rx="8" class="box-slate-fill box-slate-stroke"/>
  <text x="280" y="66" text-anchor="middle" class="text-label text-slate">Prototype/</text>

  <!-- Tree connector lines (no arrowheads — directory hierarchy) -->
  <line x1="280" y1="80" x2="280" y2="95" class="connector"/>
  <line x1="110" y1="95" x2="450" y2="95" class="connector"/>
  <line x1="110" y1="95" x2="110" y2="115" class="connector"/>
  <line x1="450" y1="95" x2="450" y2="115" class="connector"/>

  <!-- Left child: code layer -->
  <rect x="30" y="115" width="160" height="35" rx="8" class="box-cyan-fill box-cyan-stroke"/>
  <text x="110" y="135" text-anchor="middle" class="text-label text-cyan">GdsScript/Flow/</text>
  <text x="110" y="148" text-anchor="middle" class="text-sublabel">State machine code</text>

  <!-- Right child: other directories (full height = cyan + gap + emerald) -->
  <rect x="410" y="115" width="80" height="98" rx="8" class="box-slate-fill box-slate-stroke"/>
  <text x="450" y="168" text-anchor="middle" class="text-label text-slate">...</text>

  <!-- Bottom left: data layer -->
  <rect x="30" y="175" width="160" height="38" rx="8" class="box-emerald-fill box-emerald-stroke"/>
  <text x="110" y="193" text-anchor="middle" class="text-label text-emerald">Data/Kojo/</text>
  <text x="110" y="208" text-anchor="middle" class="text-sublabel">Dialogue data files</text>

  <!-- Arrow: code references data (semantic relationship) -->
  <line x1="110" y1="150" x2="110" y2="175" class="arrow-cyan"/>
  <text x="120" y="166" class="arrow-anno">References</text>

  <!-- CSV file examples -->
  <text x="195" y="193" class="text-anno">daily_greetings.csv</text>
  <text x="195" y="210" class="text-anno">shop_talks.csv</text>

  <!-- Right side annotations -->
  <text x="500" y="143" class="text-anno">Other project</text>
  <text x="500" y="156" class="text-anno">directories</text>
</svg>
