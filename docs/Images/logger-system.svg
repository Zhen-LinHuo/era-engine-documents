<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" width="700" height="240">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .text-title { fill: #0f172a; font-family: sans-serif; font-size: 16; font-weight: bold; }
      .text-label { fill: #0f172a; font-family: sans-serif; font-size: 13; font-weight: bold; }
      .text-sublabel { fill: #475569; font-family: sans-serif; font-size: 11; }
      .box-cyan-fill { fill: #ecfeff; }
      .box-cyan-stroke { stroke: #0891b2; stroke-width: 1.5; }
      .text-cyan { fill: #0e7490; }
      .box-emerald-fill { fill: #ecfdf5; }
      .box-emerald-stroke { stroke: #059669; stroke-width: 1.5; }
      .text-emerald { fill: #047857; }
      .arrow-cyan { fill: none; stroke: #0891b2; stroke-width: 1.5; marker-end: url(#arrow-cyan); }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .text-title { fill: #e2e8f0; }
        .text-label { fill: #e2e8f0; }
        .text-sublabel { fill: #94a3b8; }
        .box-cyan-fill { fill: rgba(8,51,68,0.4); }
        .box-cyan-stroke { stroke: #22d3ee; }
        .text-cyan { fill: #22d3ee; }
        .box-emerald-fill { fill: rgba(6,78,59,0.4); }
        .box-emerald-stroke { stroke: #34d399; }
        .text-emerald { fill: #34d399; }
        .arrow-cyan { stroke: #22d3ee; }
      }
    </style>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#0891b2"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" class="bg" rx="8"/>
  <text x="25" y="30" class="text-title">Logger System</text>

  <!-- Top: Logger factory (h=48, 6px top padding) -->
  <rect x="90" y="45" width="520" height="48" rx="8" class="box-cyan-fill box-cyan-stroke"/>
  <text x="350" y="64" text-anchor="middle" class="text-label text-cyan">Logger instances per service</text>
  <text x="350" y="85" text-anchor="middle" class="text-sublabel">Each creates Logger(className)</text>

  <!-- Arrows (cyan bottom y=93 → green top y=130) -->
  <line x1="140" y1="93" x2="140" y2="130" class="arrow-cyan"/>
  <line x1="280" y1="93" x2="280" y2="130" class="arrow-cyan"/>
  <line x1="420" y1="93" x2="420" y2="130" class="arrow-cyan"/>
  <line x1="560" y1="93" x2="560" y2="130" class="arrow-cyan"/>

  <!-- Green boxes (h=48, 6px top padding, 21px baseline gap) -->
  <rect x="75" y="130" width="130" height="48" rx="8" class="box-emerald-fill box-emerald-stroke"/>
  <text x="140" y="149" text-anchor="middle" class="text-label text-emerald">Logger(GM)</text>
  <text x="140" y="170" text-anchor="middle" class="text-sublabel">GameManager</text>

  <rect x="215" y="130" width="130" height="48" rx="8" class="box-emerald-fill box-emerald-stroke"/>
  <text x="280" y="149" text-anchor="middle" class="text-label text-emerald">Logger(VS)</text>
  <text x="280" y="170" text-anchor="middle" class="text-sublabel">ViewService</text>

  <rect x="355" y="130" width="130" height="48" rx="8" class="box-emerald-fill box-emerald-stroke"/>
  <text x="420" y="149" text-anchor="middle" class="text-label text-emerald">Logger(DS)</text>
  <text x="420" y="170" text-anchor="middle" class="text-sublabel">DataService</text>

  <rect x="495" y="130" width="130" height="48" rx="8" class="box-emerald-fill box-emerald-stroke"/>
  <text x="560" y="149" text-anchor="middle" class="text-label text-emerald">Logger(FS)</text>
  <text x="560" y="170" text-anchor="middle" class="text-sublabel">FlowService</text>
</svg>
