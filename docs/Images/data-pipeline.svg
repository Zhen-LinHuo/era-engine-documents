  <text x="30" y="127" class="text-sublabel">2. Group by ext name</text>
  <text x="30" y="192" class="text-sublabel">3. GD.Load+IsInherited</text>
  <text x="30" y="257" class="text-sublabel">4. Indirect OK</text>
  <text x="30" y="322" class="text-sublabel">5. Kahn algorithm</text>
  <text x="30" y="387" class="text-sublabel">6. header value</text>
  <text x="30" y="452" class="text-sublabel">7. _csv(dict)+Save()</text>
</svg>