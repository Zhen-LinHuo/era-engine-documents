  <line x1="340" y1="352" x2="340" y2="375" class="arrow-emerald"/>
  <rect x="250" y="440" width="180" height="42" rx="8" class="box-emerald-fill box-emerald-stroke"/>
  <text x="340" y="456" text-anchor="middle" class="text-label text-emerald">Save to ModelService</text>
  <line x1="340" y1="417" x2="340" y2="440" class="arrow-emerald"/>
