  <line x1="340" y1="222" x2="340" y2="245" class="arrow"/>
  <rect x="250" y="310" width="180" height="42" rx="8" class="box-slate-fill box-slate-stroke"/>
  <text x="340" y="326" text-anchor="middle" class="text-label text-slate">Topological Sort</text>
