<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .text-title { fill: #0f172a; font-family: sans-serif; font-size: 16; font-weight: bold; }
      .text-label { fill: #0f172a; font-family: sans-serif; font-size: 13; font-weight: bold; }
      .text-sublabel { fill: #475569; font-family: sans-serif; font-size: 11; }
      .text-anno { fill: #64748b; font-family: sans-serif; font-size: 10; }
      .box-cyan-fill { fill: #ecfeff; }
      .box-cyan-stroke { stroke: #0891b2; stroke-width: 1.5; }
      .text-cyan { fill: #0e7490; }
      .box-emerald-fill { fill: #ecfdf5; }
      .box-emerald-stroke { stroke: #059669; stroke-width: 1.5; }
      .text-emerald { fill: #047857; }
      .box-violet-fill { fill: #f5f3ff; }
      .box-violet-stroke { stroke: #7c3aed; stroke-width: 1.5; }
      .text-violet { fill: #6d28d9; }
      .box-rose-fill { fill: #fff1f2; }
      .box-rose-stroke { stroke: #be185d; stroke-width: 1.5; }
      .text-rose { fill: #9d174d; }
      .box-amber-fill { fill: #fffbeb; }
      .box-amber-stroke { stroke: #d97706; stroke-width: 1.5; }
      .text-amber { fill: #b45309; }
      .box-slate-fill { fill: #f1f5f9; }
      .box-slate-stroke { stroke: #64748b; stroke-width: 1.5; }
      .text-slate { fill: #475569; }
      .arrow { fill: none; stroke: #94a3b8; stroke-width: 1.5; marker-end: url(#arrow); }
      .arrow-cyan { fill: none; stroke: #0891b2; stroke-width: 1.5; marker-end: url(#arrow-cyan); }
      .arrow-emerald { fill: none; stroke: #059669; stroke-width: 1.5; marker-end: url(#arrow-emerald); }
      .arrow-rose { fill: none; stroke: #be185d; stroke-width: 1.5; marker-end: url(#arrow); }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .text-title { fill: #e2e8f0; }
        .text-label { fill: #e2e8f0; }
        .text-sublabel { fill: #94a3b8; }
        .text-anno { fill: #64748b; }
        .box-cyan-fill { fill: rgba(8,51,68,0.4); }
        .box-cyan-stroke { stroke: #22d3ee; }
        .text-cyan { fill: #22d3ee; }
        .box-emerald-fill { fill: rgba(6,78,59,0.4); }
        .box-emerald-stroke { stroke: #34d399; }
        .text-emerald { fill: #34d399; }
        .box-violet-fill { fill: rgba(76,29,149,0.4); }
        .box-violet-stroke { stroke: #a78bfa; }
        .text-violet { fill: #a78bfa; }
        .box-rose-fill { fill: rgba(136,19,55,0.4); }
        .box-rose-stroke { stroke: #fb7185; }
        .text-rose { fill: #fb7185; }
        .box-amber-fill { fill: rgba(120,53,15,0.3); }
        .box-amber-stroke { stroke: #fbbf24; }
        .text-amber { fill: #fbbf24; }
        .box-slate-fill { fill: rgba(30,41,59,0.5); }
        .box-slate-stroke { stroke: #94a3b8; }
        .text-slate { fill: #94a3b8; }
        .arrow { stroke: #64748b; }
        .arrow-cyan { stroke: #22d3ee; }
        .arrow-emerald { stroke: #34d399; }
        .arrow-rose { stroke: #fb7185; }
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#0891b2"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#059669"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" class="bg" rx="8"/>
  <text x="25" y="30" class="text-title">ERA-Engine MVC Architecture</text>
  <rect x="230" y="50" width="300" height="45" rx="8" class="box-cyan-fill box-cyan-stroke"/>
  <text x="380" y="67" text-anchor="middle" class="text-label text-cyan">GameManager (C#)</text>
  <text x="380" y="87" text-anchor="middle" class="text-sublabel">Autoload Singleton</text>
  <line x1="380" y1="95" x2="380" y2="135" class="arrow-cyan"/>
  <text x="380" y="107" text-anchor="middle" class="text-anno">holds & coordinates</text>
  <rect x="150" y="140" width="460" height="65" rx="8" class="box-emerald-fill box-emerald-stroke"/>
  <text x="380" y="167" text-anchor="middle" class="text-label text-emerald">Controller</text>
  <rect x="165" y="165" width="100" height="30" rx="6" class="box-emerald-fill box-emerald-stroke"/>
  <text x="215" y="185" text-anchor="middle" class="text-sublabel text-emerald">ModelService</text>
  <rect x="275" y="165" width="100" height="30" rx="6" class="box-emerald-fill box-emerald-stroke"/>
  <text x="325" y="185" text-anchor="middle" class="text-sublabel text-emerald">ViewService</text>
  <rect x="385" y="165" width="100" height="30" rx="6" class="box-emerald-fill box-emerald-stroke"/>
  <text x="435" y="185" text-anchor="middle" class="text-sublabel text-emerald">DataService</text>
  <rect x="495" y="165" width="100" height="30" rx="6" class="box-emerald-fill box-emerald-stroke"/>
  <text x="545" y="185" text-anchor="middle" class="text-sublabel text-emerald">FlowService</text>
  <line x1="215" y1="205" x2="215" y2="245" class="arrow-emerald"/>
  <line x1="325" y1="205" x2="325" y2="245" class="arrow-emerald"/>
  <line x1="435" y1="205" x2="435" y2="245" class="arrow-emerald"/>
  <line x1="545" y1="205" x2="545" y2="245" class="arrow-emerald"/>
  <rect x="168" y="250" width="120" height="45" rx="8" class="box-violet-fill box-violet-stroke"/>
  <text x="228" y="267" text-anchor="middle" class="text-label text-violet">Model</text>
  <text x="228" y="287" text-anchor="middle" class="text-sublabel">Data Container</text>
  <rect x="298" y="250" width="110" height="45" rx="8" class="box-rose-fill box-rose-stroke"/>
  <text x="353" y="267" text-anchor="middle" class="text-label text-rose">View</text>
  <text x="353" y="287" text-anchor="middle" class="text-sublabel">UI (Control)</text>
  <rect x="418" y="250" width="120" height="45" rx="8" class="box-amber-fill box-amber-stroke"/>
  <text x="478" y="267" text-anchor="middle" class="text-label text-amber">.gd + Data Files</text>
  <rect x="548" y="250" width="100" height="45" rx="8" class="box-slate-fill box-slate-stroke"/>
  <text x="598" y="267" text-anchor="middle" class="text-label text-slate">FSM (.gd)</text>
  <text x="30" y="330" class="text-title">Signal Wiring:</text>
  <text x="30" y="355" class="text-cyan">FlowService -> ViewService: TextCommanded / BoxCommanded</text>
  <text x="30" y="378" class="text-rose">ViewService -> FlowService: ButtonExecuted</text>
</svg>